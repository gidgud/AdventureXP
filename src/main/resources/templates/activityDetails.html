<!DOCTYPE html>
<html lang="dk" xmlns:th="https://www.thymeleaf.org/">

<head>
	<meta charset="UTF-8">
	<title>Aktivitet Detaljer</title>
	<link rel="stylesheet" th:href="@{/css/style-activity-details.css}">
</head>

<body>
	<header th:replace="~{fragments/header :: header-element}"></header>

	<div class="page-wrapper">
		<!-- Top section -->
		<div class="top-section">
			<div class="top-left">
				<img th:src="@{/img/win.png}" alt="winning" style="width: 100px; height: 125px;" />
			</div>
			<div class="top-right">
				<div class="activity-info">
					<h2 th:text="${activity.title}">Aktivitetsnavn</h2>
					<p th:text="${activity.description}">Ingen detaljer angivet</p>
				</div>
				<div class="activity-info">
					<h2>Krav</h2>
					<p th:text="${activity.requirements}">Ingen krav angivet</p>
				</div>
			</div>
		</div>

		<!-- Bottom section -->
		<div class="bottom-section">
			<div class="bottom-left">
				<div class="udstyr-header">
					<h2>Udstyr</h2>
					<button class="rediger-btn">Rediger</button>
				</div>
				<ul>
					<li>Lorem ipsum dolor sit amet</li>
					<li>Lorem ipsum dolor sit amet</li>
					<li>Lorem ipsum dolor sit amet</li>
				</ul>
			</div>
			<div class="bottom-right">
				<table>
					<tr>
						<th>Udstyr</th>
						<th>Status</th>
					</tr>
					<tr th:each="equipment : ${activity.equipmentList}">
						<td th:text="${equipment.name}">Udstyr navn</td>
						<td>
							<form th:action="@{/equipment/{id}/status(id=${equipment.id})}"
								method="post">
								<input type="hidden" name="activityId"
									th:value="${activity.id}" />
								<select name="status" onchange="this.form.submit()">
									<option value="TILGÆNGELIG"
										th:selected="${equipment.status == T(com.xpgruppe.AdventureXP.model.EquipmentStatus).TILGÆNGELIG}">
										Tilgængelig</option>
									<option value="I_BRUG"
										th:selected="${equipment.status == T(com.xpgruppe.AdventureXP.model.EquipmentStatus).I_BRUG}">
										I brug</option>
									<option value="TIL_REPARATION"
										th:selected="${equipment.status == T(com.xpgruppe.AdventureXP.model.EquipmentStatus).TIL_REPARATION}">
										Til reparation</option>
								</select>
							</form>
						</td>
					</tr>
				</table>
			</div>
		</div>
	</div>
</body>

</html>
