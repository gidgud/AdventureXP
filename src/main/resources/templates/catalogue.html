<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Aktiviteter</title>
    <link rel="stylesheet" th:href="@{/css/catalogue.css}">
</head>

<body>

<!-- HEADER -->

<!--ACTIVITIES WRAPPER-->
<div class="index_activities">

    <!--ACTIVITIES LOOP-->
    <div class="index_activities_loop" th:each="activity : ${activities}">

        <div class="activity">

            <h1 th:text="${activity.title}">Aktivitetsnavn</h1>

            <img th:src="@{/images/Sumo.jpg}" alt="Aktivitet billede"/>

            <div class="buttons">
                <button type="button" class="see_more_btn">Se mere</button>
                <button type="button" class="edit_btn">Rediger</button>
            </div>
        </div>

    </div>

    <!--ADD NEW ACTIVITY-->
    <div class="add_new_activity">
        <h1>Ny aktivitet</h1>

        <div class="activity_svg">
            <svg id="svg" xmlns="http://www.w3.org/2000/svg" height="150px" viewBox="0 -960 960 960" width="150px" fill="#FFF">
                <path d="M440-280h80v-160h160v-80H520v-160h-80v160H280v80h160v160Zm40 200q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
            </svg>
        </div>


        <div class="buttons">
            <button type="button" id="add_activity_btn">Tilføj</button>
        </div>
    </div>

</div>


    <!--LOGO-->
    <span>
        <img th:src="@{/images/Adventure_Alley_logo.png}"/>
    </span>

</body>
</html>
